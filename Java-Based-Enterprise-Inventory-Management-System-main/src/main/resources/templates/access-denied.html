<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Access Denied</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #f8f9fa; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif;}
    </style>
</head>
<body>

<div class="container text-center">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card border-0 shadow-lg p-5 rounded-4 border-top border-danger border-5">
                <div class="display-1 text-danger mb-3">
                    <i class="bi bi-shield-lock-fill"></i>
                </div>
                <h1 class="fw-bold mb-3">403 - Access Denied</h1>
                <p class="text-muted mb-4 fs-5">
                    You do not have the required permissions to access this specific area or perform this action.
                </p>
                <a href="/dashboard" class="btn btn-primary btn-lg rounded-pill px-5 shadow-sm">
                    <i class="bi bi-house-door me-2"></i> Return to Dashboard
                </a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
